version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: notesdb
      POSTGRES_USER: notesuser
      POSTGRES_PASSWORD: supersecret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notesuser -d notesdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: notesdb
      POSTGRES_USER: notesuser
      POSTGRES_PASSWORD: supersecret
      DATABASE_URL: postgresql://notesuser:supersecret@db:5432/notesdb
      SECRET_KEY: supersecret
      BACKEND_PORT: 23001
      FRONTEND_PORT: 23002
      CORS_ORIGINS: http://localhost:23002
    ports:
      - "23001:23001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:23001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:23001
      FRONTEND_PORT: 23002
    ports:
      - "23002:23002"
    depends_on:
      - backend

volumes:
  postgres_data: