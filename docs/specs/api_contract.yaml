# API_CONTRACT.md

## Endpoints

---

### POST /notes

| Property         | Value                |
|------------------|---------------------|
| HTTP Method      | POST                |
| Path             | /notes              |
| Auth Required    | No                  |
| Request Body     | `NoteCreate`        |
| Response Body    | `Note`              |
| Status Codes     | 200                 |

#### Request Body (`NoteCreate`)
| Field   | Type   | Required | Notes         |
|---------|--------|----------|--------------|
| title   | string | Yes      |              |
| content | string | No       | Optional     |

#### Response Body (`Note`)
| Field      | Type    | Notes                |
|------------|---------|----------------------|
| id         | int     |                      |
| title      | string  |                      |
| content    | string  | Optional             |
| created_at | string  | ISO 8601 timestamp   |

---

